<!-- Trigger (Contact Item) -->
<button class="btn btn-outline-primary" data-bs-toggle="offcanvas" data-bs-target="#contactPanel">
    Open Contact
</button>

<!-- Offcanvas (Right Side Nav) -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="contactPanel">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title">Contact Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body">
        <p><strong>Name:</strong> John Doe</p>
        <p><strong>Email:</strong> john@example.com</p>

        <hr>

        <button class="btn btn-primary w-100">Send Message</button>
        <button class="btn btn-outline-secondary w-100 mt-2">View Orders</button>
    </div>
</div>
