<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easymarket-New listing</title>

    <script type="module" src="/src/js/auth/isAuthed.js"></script>

    <link rel="stylesheet" href="/src/css/styles.css">

    <script defer src="/src/js/NAV.js"></script>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>

    <!-- Tagify CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tagify/4.35.4/tagify.min.css">

    <!-- Tagify JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tagify/4.35.4/tagify.min.js"></script>


    <script defer type="module" src="/src/js/listings/updateListing.js" ></script>

    <script defer type="module" src="/src/js/improved_messages/chatList.js"></script>

    <script defer type="module" src="/src/js/toast.js"></script>
    <script defer type="module" src="/src/js/handleErrorMessage.js"></script>

</head>

<body class="bg-body-tertiary">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm py-2" id="NAV">
        <!-- Nav comes here -->
    </nav>

    <div class="container d-flex justify-content-center my-5">
        <div class="w-auto d-flex flex-column gap-4">
            <h1 class="h1 text-center">Update a new listing</h1>
            <form id="newLisitingForm">

                <!-- listing images -->
                <div id="drop-area" class="border border-dashed p-4 text-center mb-3">
                    <p>Drag & drop images here, or click to select</p>
                    <input type="file" id="images" name="images[]" multiple accept="image/*" hidden>
                    <div id="preview" class="d-flex flex-wrap gap-2 mt-2"></div>
                </div>

                <!-- listing deltails -->
                <h5>Listing details</h5>
                <div class="form-floating mb-3">
                    <input type="text" name="title" id="title" class="form-control">
                    <label class="form-label" for="title">title</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="number" name="price" id="price" class="form-control" min="1" max="50000" value="1">
                    <label class="form-label" for="price">price</label>
                </div>

                <div class="form-floating mb-3">
                    <textarea name="description" id="description" class="form-control" style="height: 100px; max-height: 200px; min-height: 100px"></textarea>
                    <label for="description">Description</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="number" name="quantity" id="quantity" min="1" max="1000" value="1" class="form-control">
                    <label class="form-label" for="quantity">Amount</label>
                </div>

                <h5>Category</h5>
                <div class="form-floating mb-3">
                    <select class="form-select" id="category">
                        <option value="0" selected>Select a category</option>
                        <!-- category options are added here -->
                    </select>
                    <label for="category">Category</label>
                </div>

                <div class="form-floating mb-3">
                    <select class="form-select" id="subcategory" disabled>
                        <option value="0" selected>Select a subcategory</option>
                        <!-- subcategory options are added here -->
                    </select>
                    <label for="subcategory">Subcategory</label>
                </div>


                <h5>Condition</h5>
                <div class="form-floating mb-3">
                    <select class="form-select" id="condition">
                        <option value="0" selected>Select a condition</option>
                        <option value="New">New</option>
                        <option value="Good">Good</option>
                        <option value="Broken">Broken</option>
                    </select>
                    <label for="condition">Condition</label>
                </div>

                

                
                <h5>Location</h5>
                <div class="form-floating mb-3">
                    <select class="form-select" id="province">
                        <option value="0" selected>Select a provice</option>
                        <!-- provinces are added here -->
                    </select>
                    <label for="province">Provice</label>
                </div>

                <div class="form-floating mb-3">
                    <select class="form-select" id="city" disabled>
                        <option value="0" selected>Select a city</option>
                        <!-- cities are added here -->
                    </select>
                    <label for="city">City</label>
                </div>

                <h5>Delivery Method</h5>
                <div class="form-floating mb-3">
                    <select class="form-select" id="delivery">
                        <option value="0" selected>Select a delivery option</option>
                        <option value="Public meetup">Public meetup</opton>
                        <option value="Door pick-up">Door pick-up</option>
                        <option value="Door drop-off">Door drop-off</option>
                        <option value="Courier service">Courier service</option>
                    </select>
                    <label for="delivery">Delivery option</label>
                </div>

                <h5>Advanced Search</h5>

                <div class="mb-3">
                    <label for="tagsInput" class="form-label text-muted">Tags (optional)</label>
                    
                    <div class="input-group">
                        <!-- Tagify input -->
                        <input 
                            id="tagsInput" 
                            name="tagsInput" 
                            placeholder="Add a tag" 
                            class="form-control"
                        >
                        <!-- Add button -->
                        <button class="btn btn-primary" type="button" id="btnAddTag">+</button>
                    </div>
                </div>


                <div>
                    <button type="reset" class="btn btn-danger">Cancel</button>
                    <button type="button" id="btnPreviewListing" class="btn btn-primary">Preview</button>
                    <button type="submit" class="btn btn-success">Submit</button>
                </div>
                

            </form>
        </div>
    </div>








        <!-- Offcanvas (Right Side Nav) -->
    <div class="offcanvas offcanvas-end rounded me-2 my-5 marginTop" data-bs-scroll="true" data-bs-backdrop="false"  tabindex="-1" id="contactPanel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">Chat</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body d-flex flex-column p-0">

            <!-- Messages -->
            <div id="chat_canvas" class="flex-grow-1 p-3 overflow-auto">
                <!-- Messages are added here-->
            </div>

        </div>
    </div>



    <!-- Chat Modal - used to send messages -->
    <div class="modal fade" id="chatModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="chatUserName">Chat</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div id="chatMessagesContainer" class="d-flex flex-column gap-2 overflow-auto" style="max-height: 20vh;">
                        <!-- messages are added here -->
                    </div>
                </div>


                <!-- CHAT INPUT BOX -->
                <div class="modal-footer ">
                    <div class="input-group">
                       <input type="text" 
                        class="form-control" 
                        placeholder="Type a message..."
                        id="messageInputModal">

                        <button class="btn btn-success " id="btnSendMessageModal">
                            Send
                        </button> 
                    </div>
                </div>
                
            </div>
        </div>
    </div>


    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="position-fixed top-0 start-0 w-100 h-100 d-flex flex-column justify-content-center align-items-center bg-white z-1 d-none">

        <!-- Bootstrap Spinner -->
        <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
            <span class="visually-hidden">Uploading Lisitng</span>
        </div>

        <!-- Loading Text -->
        <p class="mt-3 fw-semibold">Uploading Lisitng</p>
    </div>



<script>

    //implement a search button
    document.addEventListener("DOMContentLoaded", ()=>{
        const searchBtn = document.getElementById("searchBtn")

        searchBtn.addEventListener("click", ()=>{
            console.log("Clicking search btn");
            const query = document.getElementById("searchBox").value
            
            //check that we have a value before making request to server
            if(!query || query.length === 0){
                console.log({"error" : "invalid search term"});
                return false;
            }

            window.location = `/src/pages/products/search-view.html?query=${encodeURIComponent(query)}`  
        })
    })

</script>

</body>
</html>
