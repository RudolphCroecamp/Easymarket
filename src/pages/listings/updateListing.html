<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easymarket-New listing</title>

    <script type="module" src="/src/js/auth/isAuthed.js"></script>

    <link rel="stylesheet" href="/src/css/styles.css">

    <script defer src="/src/js/NAV.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <!-- Tagify CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@yaireo/tagify/dist/tagify.css">

    <!-- Tagify CSS & JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@yaireo/tagify/dist/tagify.css">
    <script src="https://cdn.jsdelivr.net/npm/@yaireo/tagify"></script>


    <script defer type="module" src="/src/js/listings/updateListing.js" ></script>

    <script defer type="module" src="/src/js/improved_messages/chatList.js"></script>

    <script defer type="module" src="src/js/toast.js"></script>
    <script defer type="module" src="src/js/handleErrorMessage.js"></script>

</head>

<body class="bg-body-tertiary">
    
    <!-- NAVBAR -->
    <nav id="NAV" class="navbar navbar-dark bg-dark sticky-top shadow-sm border-bottom">
        <!-- Nav comes here -->
    </nav>

    <div class="container d-flex justify-content-center mt-5">
        <div class="w-100 d-flex flex-column gap-4">
            <h1 class="h1 text-center">Update Listing</h1>
            <form id="newLisitingForm">

                <!-- listing images -->
                <div id="drop-area" class="border border-dashed p-4 text-center mb-3">
                    <p>Drag & drop images here, or click to select</p>
                    <input type="file" id="images" name="images[]" multiple accept="image/*" hidden>
                    <div id="preview" class="d-flex flex-wrap gap-2 mt-2"></div>
                </div>

                <!-- listing deltails -->
                <div class="form-floating mb-3">
                    <input type="text" name="title" id="title" class="form-control">
                    <label class="form-label" for="title">title</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="number" name="price" id="price" class="form-control">
                    <label class="form-label" for="price">price</label>
                </div>

                <!-- get categories from listingOptions.js -->
                <div class="form-floating mb-3">
                    <select class="form-select" id="category">
                        <option selected>Select a category</option>
                        <!-- category options are added here -->
                    </select>
                    <label for="category">Category</label>
                </div>

                <div class="form-floating mb-3">
                    <select class="form-select" id="condition">
                        <option selected>Select a condition</option>
                        <option value="1">New</option>
                        <option value="2">Good</option>
                        <option value="3">Broken</option>
                    </select>
                    <label for="condition">Condition</label>
                </div>

                <div class="form-floating mb-3">
                    <textarea name="description" id="description" class="form-control" style="height: 100px; max-height: 200px; min-height: 100px"></textarea>
                    <label for="description">Description</label>
                </div>

                <div class="mb-3">
                    <label for="tagsInput" class="form-label text-muted">Tags</label>
                    
                    <div class="input-group">
                        <!-- Tagify input -->
                        <input 
                            id="tagsInput" 
                            name="tagsInput" 
                            placeholder="Add a tag" 
                            class="form-control"
                        >
                        <!-- Add button -->
                        <button class="btn btn-primary" type="button" id="btnAddTag">+</button>
                    </div>
                </div>

                <div class="form-floating mb-3">
                    <select class="form-select" id="amountType">
                        <option selected>Select amount available</option>
                        <option value="1">Single item</opton>
                        <option value="2">Multiple items</option>
                    </select>
                    <label for="amountType">Amount Available</label>
                </div>

                <div id="quantityContainer" class="form-floating mb-3 visually-hidden" >
                    <input type="number" name="quantity" id="quantity" class="form-control">
                    <label class="form-label" for="quantity">Quantity</label>
                </div>


                <!-- <div class="form-floating mb-3">
                    <input type="text" name="location" id="location" class="form-control">
                    <label class="form-label" for="location">location</label>
                </div> -->


                <div class="form-floating mb-3">
                    <select class="form-select" id="delivery">
                        <option selected>Select a delivery option</option>
                        <option value="1">Public meetup</opton>
                        <option value="2">Door pick-up</option>
                        <option value="3">Door drop-off</option>
                        <option value="4">Courier service</option>
                    </select>
                    <label for="delivery">Delivery option</label>
                </div>


                <div>
                    <button type="reset" class="btn btn-danger">Cancel</button>
                    <button type="button" id="btnPreviewListing" class="btn btn-primary">Preview</button>
                    <button type="submit" class="btn btn-success">Submit</button>
                </div>
                

            </form>
        </div>
    </div>







        <!-- Offcanvas (Right Side Nav) -->
    <div class="offcanvas offcanvas-end rounded me-2 my-5 marginTop" data-bs-scroll="true" data-bs-backdrop="false"  tabindex="-1" id="contactPanel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">Chat</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body d-flex flex-column p-0">

            <!-- Messages -->
            <div id="chat_canvas" class="flex-grow-1 p-3 overflow-auto">
                <!-- Messages are added here-->
            </div>

        </div>
    </div>



    <!-- Chat Modal - used to send messages -->
    <div class="modal fade" id="chatModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="chatUserName">Chat</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div id="chatMessagesContainer" class="d-flex flex-column gap-2 overflow-auto" style="max-height: 20vh;">
                        <!-- messages are added here -->
                    </div>
                </div>


                <!-- CHAT INPUT BOX -->
                <div class="modal-footer ">
                    <div class="input-group">
                       <input type="text" 
                        class="form-control" 
                        placeholder="Type a message..."
                        id="messageInput">

                        <button class="btn btn-success " id="btnSendMessageModal">
                            Send
                        </button> 
                    </div>
                </div>
                
            </div>
        </div>
    </div>



<script>

    //implement a search button
    document.addEventListener("DOMContentLoaded", ()=>{
        const searchBtn = document.getElementById("searchBtn")

        searchBtn.addEventListener("click", ()=>{
            console.log("Clicking search btn");
            const query = document.getElementById("searchBox").value
            
            //check that we have a value before making request to server
            if(!query || query.length === 0){
                console.log({"error" : "invalid search term"});
                return false;
            }

            window.location = `/src/pages/products/search-view.html?query=${encodeURIComponent(query)}`  
        })
    })

</script>


</body>
</html>
