<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easymarket-My listings</title>

    <script type="module" src="/src/js/auth/isAuthed.js" ></script>

    <link rel="stylesheet" href="/src/css/styles.css">
    
    <script defer src="/src/js/NAV.js"></script>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>

    
    <script defer type="module" src="/src/js/listings/getListings.js"></script>

    <script defer type="module" src="/src/js/improved_messages/chatList.js"></script>

    <script defer type="module" src="/src/js/toast.js"></script>
    <script defer type="module" src="/src/js/handleErrorMessage.js"></script>

    <style>
        .listingImg {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body class="bg-body-tertiary">
    
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm py-2" id="NAV">
        <!-- Nav comes here -->
    </nav>


    

    <div class="form-floating m-4 col-12 col-sm-4  col-md-3 col-xl-2">
        <select class="form-select" id="filterListings">
            <option value="available">Available</option>
            <option value="all">All</option>
            <option value="deleted">Deleted</option>
        </select>
        <label for="filterListings">Filter Listings</label>
    </div>
    
    <div id="products-container" class="row g-4 d-flex py-5 mx-2">
        
    </div>




        <!-- Offcanvas (Right Side Nav) -->
    <div class="offcanvas offcanvas-end rounded me-2 my-5 marginTop" data-bs-scroll="true" data-bs-backdrop="false"  tabindex="-1" id="contactPanel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">Chat</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body d-flex flex-column p-0">

            <!-- Messages -->
            <div id="chat_canvas" class="flex-grow-1 p-3 overflow-auto">
                <!-- Messages are added here-->
            </div>

        </div>
    </div>



    <!-- Chat Modal - used to send messages -->
    <div class="modal fade" id="chatModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="chatUserName">Chat</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div id="chatMessagesContainer" class="d-flex flex-column gap-2 overflow-auto" style="max-height: 20vh;">
                        <!-- messages are added here -->
                    </div>
                </div>


                <!-- CHAT INPUT BOX -->
                <div class="modal-footer ">
                    <div class="input-group">
                       <input type="text" 
                        class="form-control" 
                        placeholder="Type a message..."
                        id="messageInputModal">

                        <button class="btn btn-success " id="btnSendMessageModal">
                            Send
                        </button> 
                    </div>
                </div>
                
            </div>
        </div>
    </div>


<script>

    //implement a search button
    document.addEventListener("DOMContentLoaded", ()=>{
        const searchBtn = document.getElementById("searchBtn")

        searchBtn.addEventListener("click", ()=>{
            console.log("Clicking search btn");
            const query = document.getElementById("searchBox").value
            
            //check that we have a value before making request to server
            if(!query || query.length === 0){
                console.log({"error" : "invalid search term"});
                return false;
            }

            window.location = `/src/pages/products/search-view.html?query=${encodeURIComponent(query)}`  
        })
    })

</script>


</body>
</html>
