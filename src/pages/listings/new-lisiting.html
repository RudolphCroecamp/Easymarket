<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easymarket-New listing</title>

    <script type="module" src="../../../src/js/auth/isAuthed.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <!-- Tagify CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@yaireo/tagify/dist/tagify.css">

    <!-- Tagify CSS & JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@yaireo/tagify/dist/tagify.css">
    <script src="https://cdn.jsdelivr.net/npm/@yaireo/tagify"></script>


    <script defer type="module" src="../../../src/js/listings/newListing.js"></script>

    <script defer type="module" src="../../js/toast.js"></script>
    <script defer type="module" src="../../js/handleErrorMessage.js"></script>


    <style>
        #drop-area {
            background: #f8f9fa;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.2s;
        }

        #drop-area.dragover {
            background: #e2e6ea;
        }

        .preview-item {
            position: relative;
            display: inline-block;
        }

        .preview-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .remove-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            background: red;
            color: white;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-body-tertiary">
    
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Logo</a>
    
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mynavbar">

                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                        </li>
                    <li class="dropdown">
                        <button class="nav-link btn-link dropdown-toggle active" type="button" data-bs-toggle="dropdown" aria-expanded="false">my listings</button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/src/pages/listings/view-listings.html">view listings</a></li>
                            <li><a class="dropdown-item" href="/src/pages/listings/new-lisiting.html">New listing</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="/src/pages/listings/view-listings.html">Remove listing</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/src/pages/auth/logout.html">logout</a>
                    </li>
                </ul>
            </div>

        </div>
    </nav>

    <div class="container d-flex justify-content-center my-5">
        <div class="w-auto d-flex flex-column gap-4">
            <h1 class="h1 text-center">Create a new listing</h1>
            <form id="newLisitingForm">

                <!-- listing images -->
                <div id="drop-area" class="border border-dashed p-4 text-center mb-3">
                    <p>Drag & drop images here, or click to select</p>
                    <input type="file" id="images" name="images[]" multiple accept="image/*" hidden>
                    <div id="preview" class="d-flex flex-wrap gap-2 mt-2"></div>
                </div>

                <!-- listing deltails -->
                 <h5>Listing details</h5>
                <div class="form-floating mb-3">
                    <input type="text" name="title" id="title" class="form-control">
                    <label class="form-label" for="title">title</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="number" name="price" id="price" class="form-control">
                    <label class="form-label" for="price">price</label>
                </div>

                <div class="form-floating mb-3">
                    <textarea name="description" id="description" class="form-control" style="height: 100px; max-height: 200px; min-height: 100px"></textarea>
                    <label for="description">Description</label>
                </div>

                <h5>Category</h5>
                <div class="form-floating mb-3">
                    <select class="form-select" id="category">
                        <option value="0" selected>Select a category</option>
                        <!-- category options are added here -->
                    </select>
                    <label for="category">Category</label>
                </div>

                <div class="form-floating mb-3">
                    <select class="form-select" id="subcategory" disabled>
                        <option value="0" selected>Select a subcategory</option>
                        <!-- subcategory options are added here -->
                    </select>
                    <label for="category">Subcategory</label>
                </div>


                <h5>Condition</h5>
                <div class="form-floating mb-3">
                    <select class="form-select" id="condition">
                        <option value="0" selected>Select a condition</option>
                        <option value="New">New</option>
                        <option value="Good">Good</option>
                        <option value="Broken">Broken</option>
                    </select>
                    <label for="condition">Condition</label>
                </div>

                

                
                <h5>Location</h5>
                <div class="form-floating mb-3">
                    <select class="form-select" id="province">
                        <option value="0" selected>Select a provice</option>
                        <!-- provinces are added here -->
                    </select>
                    <label for="province">Provice</label>
                </div>

                <div class="form-floating mb-3">
                    <select class="form-select" id="city" disabled>
                        <option value="0" selected>Select a city</option>
                        <!-- cities are added here -->
                    </select>
                    <label for="city">City</label>
                </div>

                <h5>Delivery Method</h5>
                <div class="form-floating mb-3">
                    <select class="form-select" id="delivery">
                        <option value="0" selected>Select a delivery option</option>
                        <option value="Public meetup">Public meetup</opton>
                        <option value="Door pick-up">Door pick-up</option>
                        <option value="Door drop-off">Door drop-off</option>
                        <option value="Courier service">Courier service</option>
                    </select>
                    <label for="delivery">Delivery option</label>
                </div>

                <h5>Advanced Search</h5>

                <div class="mb-3">
                    <label for="tagsInput" class="form-label text-muted">Tags (optional)</label>
                    
                    <div class="input-group">
                        <!-- Tagify input -->
                        <input 
                            id="tagsInput" 
                            name="tagsInput" 
                            placeholder="Add a tag" 
                            class="form-control"
                        >
                        <!-- Add button -->
                        <button class="btn btn-primary" type="button" id="btnAddTag">+</button>
                    </div>
                </div>


                <div>
                    <button type="reset" class="btn btn-danger">Cancel</button>
                    <button type="button" id="btnPreviewListing" class="btn btn-primary">Preview</button>
                    <button type="submit" class="btn btn-success">Submit</button>
                </div>
                

            </form>
        </div>
    </div>

</body>
</html>
