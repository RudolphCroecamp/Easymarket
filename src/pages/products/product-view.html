<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easymarket-Product View</title>

    <script type="module" src="../../js/auth/isAuthed.js" ></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    
    <script defer type="module" src="../../js/products/getProductById.js"></script>

        <script defer type="module" src="../../js/toast.js"></script>
    <script defer type="module" src="../../js/handleErrorMessage.js"></script>

    <style>
        .icon {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }

        .slider-card:hover {
            transform: translateY(-4px);
        }

        .product-slider {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding: 0.5rem;

            max-width: 1100px;
            width: 100%;
            margin: 0 auto;

            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        /* hide scrollbar */
        .product-slider::-webkit-scrollbar {
            display: none;
        }

        .slider-card {
            flex: 0 0 auto;
            width: 180px;
            scroll-snap-align: start;
        }


        #starRating i {
            cursor: pointer;
            color: #ccc;
            transition: 0.2s;
        }

        #starRating i.active {
            color: gold;
        }

        #starRating i:hover {
            transform: scale(1.2);
        }
        

    </style>
</head>
<body class="bg-body-tertiary">
    
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Logo</a>
            

            <div class="d-flex" >
                <input class="form-control me-2" id="searchBox" type="text" placeholder="Search">
                <button class="btn btn-primary" id="searchBtn">Search</button>
            </div>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mynavbar">

                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                        </li>
                    <li class="dropdown">
                        <button class="nav-link btn-link dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            my listings
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/src/pages/listings/view-listings.html">view listings</a></li>
                            <li><a class="dropdown-item" href="/src/pages/listings/new-lisiting.html">New listing</a></li>
                            <li><hr class="dropdown-divider "></li>
                            <li><a class="dropdown-item" href="/src/pages/listings/view-listings.html">Remove listing</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/src/pages/auth/logout.html">logout</a>
                    </li>
                </ul>
            </div>

        </div>
    </nav>


    

    <!-- product details comes here -->
    <div class="container mt-4" >
        <div class="row justify-content-center gap-5" id="productview-container">

        </div>
    </div>


    <div class="container my-4 ">

        <div class="d-flex justify-content-between align-items-center mb-2 mx-3">
            <h3 class="mb-0 fw-bold">Similar Products</h3>

            <div class="d-flex gap-2">
                <button class="btn btn-dark shadow-sm btn-sm" id="scrollLeft">‹</button>
                <button class="btn btn-dark shadow-sm btn-sm" id="scrollRight">›</button>
            </div>
        </div>

        <div class="product-slider mx-auto " id="similarProductsContainer">
            <!-- cards -->
        </div>

    </div>

    <!-- Comments -->
     <div class="container my-4 ">
        <div class="row justify-content-center mx-1">
            <h3 class="fw-bold mb-2">Reviews</h3>
            <div class="col-12" id="commentsContainer">
                <!-- comments are added here -->
            </div>
        </div>
    </div>

<!-- Review Modal -->
<div class="modal fade" id="reviewModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 shadow">
            
            <div class="modal-header border-0">
                <h5 class="modal-title">Write a Review</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                
                <!-- Rating -->
                <div class="mb-3 text-center">
                    <label class="form-label fw-semibold">Your Rating</label>
                    <div id="starRating" class="fs-3">
                        <i class="bi bi-star" data-value="1"></i>
                        <i class="bi bi-star" data-value="2"></i>
                        <i class="bi bi-star" data-value="3"></i>
                        <i class="bi bi-star" data-value="4"></i>
                        <i class="bi bi-star" data-value="5"></i>
                    </div>
                </div>

                <!-- Review -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Your Review</label>
                    <textarea id="reviewText" class="form-control rounded-3" rows="4" placeholder="Share your experience..."></textarea>
                </div>

            </div>

            <div class="modal-footer border-0">
                <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button id="submitReview" class="btn btn-primary">Submit Review</button>
            </div>

        </div>
    </div>
</div>
    <script>
        const searchBtn = document.getElementById("searchBtn")
        let AMOUNT = 1;
        let amountAvailable = 0;

        searchBtn.addEventListener("click", ()=>{
            const query = document.getElementById("searchBox").value
            
            //check that we have a value before making request to server
            if(!query || query.length === 0){
                console.log({"error" : "invalid search term"});
                return false;
            }

            window.location = `./search-view.html?query=${query}` 
        })
    </script>
</body>
</html>
