<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easymarket-Product View</title>

    <script type="module" src="/src/js/auth/isAuthed.js" ></script>

    <link rel="stylesheet" href="/src/css/styles.css">
    
    <script defer src="/src/js/NAV.js"></script>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css">
    
    <script defer type="module" src="/src/js/products/getProductById.js"></script>

    <script defer type="module" src="/src/js/improved_messages/chatList.js"></script>

    <style>
        .icon {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }

        .slider-card:hover {
            transform: translateY(-4px);
        }

        .product-slider {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding: 0.5rem;

            max-width: 1100px;
            width: 100%;
            margin: 0 auto;

            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        /* hide scrollbar */
        .product-slider::-webkit-scrollbar {
            display: none;
        }

        .slider-card {
            flex: 0 0 auto;
            width: 180px;
            scroll-snap-align: start;
        }


        #starRating i {
            cursor: pointer;
            color: #ccc;
            transition: 0.2s;
        }

        #starRating i.active {
            color: gold;
        }

        #starRating i:hover {
            transform: scale(1.2);
        }


        .quantity-stepper {
            width: 95px !important;
        }

        .quantity-stepper .btn {
            padding: 0.15rem 0.4rem;
            font-size: 14px;
            line-height: 1;
        }

        .quantity-stepper input {
            padding: 0.15rem;
            font-size: 14px;
        }

    </style>
</head>
<body class="bg-body-tertiary">
    
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm py-2 z-2" id="NAV">
        <!-- Nav comes here -->
    </nav>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="position-fixed top-0 start-0 w-100 h-100 d-flex flex-column justify-content-center align-items-center bg-white z-1">

        <!-- Bootstrap Spinner -->
        <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
            <span class="visually-hidden">Loading...</span>
        </div>

        <!-- Loading Text -->
        <p class="mt-3 fw-semibold">Loading page...</p>
    </div>


    

    <!-- product details comes here -->
    <div class="container mt-4" style="visibility: hidden;" id="productSection">
        <div class="row justify-content-center gap-5" id="productview-container">

        </div>
    </div>

    <!-- Similar products -->
    <div class="container my-4" style="visibility: hidden;" id="similarSection">

        <div class="d-flex justify-content-between align-items-center mb-2 mx-3">
            <h3 class="mb-0 fw-bold">Similar Products</h3>

            <div class="d-flex gap-2">
                <button class="btn btn-dark shadow-sm btn-sm" id="scrollLeft">‹</button>
                <button class="btn btn-dark shadow-sm btn-sm" id="scrollRight">›</button>
            </div>
        </div>

        <div class="product-slider mx-auto " id="similarProductsContainer" >
            <!-- cards -->
        </div>

    </div>

    <!-- Comments -->
     <div class="container my-4" style="visibility: hidden;" id="commentSection">
        <div class="row justify-content-center mx-1">
            <h3 class="fw-bold mb-2">Reviews</h3>
            <div class="col-12" id="commentsContainer">
                <!-- comments are added here -->
            </div>
        </div>
    </div>

    <!-- Review Modal -->
    <div class="modal fade" id="reviewModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 shadow">
                
                <div class="modal-header border-0">
                    <h5 class="modal-title">Write a Review</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    
                    <!-- Rating -->
                    <div class="mb-3 text-center">
                        <label class="form-label fw-semibold">Your Rating</label>
                        <div id="starRating" class="fs-3">
                            <i data-value="1">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-star" viewBox="0 0 16 16">

                                </svg>
                            </i>
                            <i data-value="2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-star" viewBox="0 0 16 16">
                                    <path d="M2.866 14.85c-.078.444.36.791.746.593l4.39-2.256 4.389 2.256c.386.198.824-.149.746-.592l-.83-4.73 3.522-3.356c.33-.314.16-.888-.282-.95l-4.898-.696L8.465.792a.513.513 0 0 0-.927 0L5.354 5.12l-4.898.696c-.441.062-.612.636-.283.95l3.523 3.356-.83 4.73zm4.905-2.767-3.686 1.894.694-3.957a.56.56 0 0 0-.163-.505L1.71 6.745l4.052-.576a.53.53 0 0 0 .393-.288L8 2.223l1.847 3.658a.53.53 0 0 0 .393.288l4.052.575-2.906 2.77a.56.56 0 0 0-.163.506l.694 3.957-3.686-1.894a.5.5 0 0 0-.461 0z"/>
                                </svg></i>
                            <i data-value="3">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-star" viewBox="0 0 16 16">
                                    <path d="M2.866 14.85c-.078.444.36.791.746.593l4.39-2.256 4.389 2.256c.386.198.824-.149.746-.592l-.83-4.73 3.522-3.356c.33-.314.16-.888-.282-.95l-4.898-.696L8.465.792a.513.513 0 0 0-.927 0L5.354 5.12l-4.898.696c-.441.062-.612.636-.283.95l3.523 3.356-.83 4.73zm4.905-2.767-3.686 1.894.694-3.957a.56.56 0 0 0-.163-.505L1.71 6.745l4.052-.576a.53.53 0 0 0 .393-.288L8 2.223l1.847 3.658a.53.53 0 0 0 .393.288l4.052.575-2.906 2.77a.56.56 0 0 0-.163.506l.694 3.957-3.686-1.894a.5.5 0 0 0-.461 0z"/>

                            <i data-value="4">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-star" viewBox="0 0 16 16">
                                    <path d="M2.866 14.85c-.078.444.36.791.746.593l4.39-2.256 4.389 2.256c.386.198.824-.149.746-.592l-.83-4.73 3.522-3.356c.33-.314.16-.888-.282-.95l-4.898-.696L8.465.792a.513.513 0 0 0-.927 0L5.354 5.12l-4.898.696c-.441.062-.612.636-.283.95l3.523 3.356-.83 4.73zm4.905-2.767-3.686 1.894.694-3.957a.56.56 0 0 0-.163-.505L1.71 6.745l4.052-.576a.53.53 0 0 0 .393-.288L8 2.223l1.847 3.658a.53.53 0 0 0 .393.288l4.052.575-2.906 2.77a.56.56 0 0 0-.163.506l.694 3.957-3.686-1.894a.5.5 0 0 0-.461 0z"/>
                                </svg>
                            </i>
                            <i data-value="5">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-star" viewBox="0 0 16 16">
                                    <path d="M2.866 14.85c-.078.444.36.791.746.593l4.39-2.256 4.389 2.256c.386.198.824-.149.746-.592l-.83-4.73 3.522-3.356c.33-.314.16-.888-.282-.95l-4.898-.696L8.465.792a.513.513 0 0 0-.927 0L5.354 5.12l-4.898.696c-.441.062-.612.636-.283.95l3.523 3.356-.83 4.73zm4.905-2.767-3.686 1.894.694-3.957a.56.56 0 0 0-.163-.505L1.71 6.745l4.052-.576a.53.53 0 0 0 .393-.288L8 2.223l1.847 3.658a.53.53 0 0 0 .393.288l4.052.575-2.906 2.77a.56.56 0 0 0-.163.506l.694 3.957-3.686-1.894a.5.5 0 0 0-.461 0z"/>
                                </svg>
                            </i>
                        </div>
                    </div>

                    <!-- Review -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Your Review</label>
                        <textarea id="reviewText" class="form-control rounded-3" rows="4" placeholder="Share your experience..."></textarea>
                    </div>

                </div>

                <div class="modal-footer border-0">
                    <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button id="submitReview" class="btn btn-primary">Submit Review</button>
                </div>

            </div>
        </div>
    </div>


    

        <!-- Offcanvas (Right Side Nav) -->
    <div class="offcanvas offcanvas-end rounded me-2 my-5 marginTop" data-bs-scroll="true" data-bs-backdrop="false"  tabindex="-1" id="contactPanel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">Chat</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body d-flex flex-column p-0">

            <!-- Messages -->
            <div id="chat_canvas" class="flex-grow-1 p-3 overflow-auto">
                <!-- Messages are added here-->
            </div>

        </div>
    </div>



    <!-- Chat Modal - used to send messages -->
    <div class="modal fade" id="chatModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="chatUserName">Chat</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div id="chatMessagesContainer" class="d-flex flex-column gap-2 overflow-auto" style="max-height: 20vh;">
                        <!-- messages are added here -->
                    </div>
                </div>


                <!-- CHAT INPUT BOX -->
                <div class="modal-footer ">
                    <div class="input-group">
                       <input type="text" 
                        class="form-control" 
                        placeholder="Type a message..."
                        id="messageInputModal">

                        <button class="btn btn-success " id="btnSendMessageModal">
                            Send
                        </button> 
                    </div>
                </div>
                
            </div>
        </div>
    </div>
</body>
</html>
