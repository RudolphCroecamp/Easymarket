<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easymarket-Search</title>
    
    <script type="module" src="../../js/auth/isAuthed.js" ></script>

    <link defer href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    
    <script defer type="module" src="../../js/products/searchProduct.js" ></script>

    <script defer type="module" src="../../js/toast.js"></script>
    <script defer type="module" src="../../js/handleErrorMessage.js"></script>

</head>
<body>
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Logo</a>
            

            <div class="d-flex" >
                <input class="form-control me-2" id="searchBox" type="text" placeholder="Search">
                <button class="btn btn-primary" id="searchBtn">Search</button>
            </div>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mynavbar">

                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link btn-link active" href="/">Home</a>
                    </li>
                    <li class="dropdown">
                        <button class="nav-link btn-link dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            my listings
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/src/pages/listings/view-listings.html">view listings</a></li>
                            <li><a class="dropdown-item" href="/src/pages/listings/new-lisiting.html">New listing</a></li>
                            <li><hr class="dropdown-divider "></li>
                            <li><a class="dropdown-item" href="/src/pages/listings/view-listings.html">Remove listing</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/src/pages/auth/logout.html">logout</a>
                    </li>
                </ul>
            </div>

        </div>
    </nav>



    <div class="container py-5">
        <!-- Products are added in this container -->
        <div class="row g-4" id="searchProducts-container">
            
        </div>

        <div class="d-flex justify-content-center mt-5">
            <div class="spinner-border" role="status" id="loading">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

    </div>

</body>

<script>

    document.addEventListener("DOMContentLoaded", ()=>{
        const searchBtn = document.getElementById("searchBtn")

        searchBtn.addEventListener("click", ()=>{
            const query = document.getElementById("searchBox").value
            
            //check that we have a value before making request to server
            if(!query || query.length === 0){
                console.log({"error" : "invalid search term"});
                return false;
            }

            window.location = `./search-view.html?query=${query}` 
        })   
    })

    
</script>
</html>
