<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>easymarket - Checkout Form</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body{
            background:#f5f7fb;
            min-height:100vh;
        }

        .checkout-wrapper{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:40px 15px;
        }

        .checkout-card{
            width:100%;
            max-width:750px;
            background:#fff;
            border:none;
            border-radius:26px;
            overflow:hidden;
            box-shadow:0 15px 45px rgba(0,0,0,0.08);
        }

        .checkout-header{
            background:linear-gradient(135deg,#111827,#1f2937);
            color:white;
            padding:40px;
        }

        .checkout-icon{
            width:70px;
            height:70px;
            border-radius:20px;
            background:rgba(255,255,255,0.1);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:1.8rem;
            margin-bottom:20px;
        }

        .form-section{
            padding:40px;
        }

        .form-label{
            font-weight:600;
            margin-bottom:10px;
            color:#1f2937;
        }

        .input-group-text{
            border-radius:14px 0 0 14px;
            border:1px solid #dbe3ec;
            border-right:none;
            background:#f8fafc;
            padding:0 18px;
        }

        .form-control{
            height:56px;
            border-radius:0 14px 14px 0;
            border:1px solid #dbe3ec;
            border-left:none;
            font-size:0.95rem;
            transition:0.2s ease;
        }

        .form-control:focus{
            border-color:#111827;
            box-shadow:0 0 0 4px rgba(17,24,39,0.08);
        }

        .submit-btn{
            height:58px;
            border:none;
            border-radius:16px;
            /* background:#111827; */
            color:white;
            font-weight:600;
            font-size:1rem;
            transition:0.2s ease;
        }

        .submit-btn:hover{
            /* background:#000; */
            background: hsl(152, 69%, 40%);
            transform:translateY(-1px);
        }

        @media(max-width:768px){
            .checkout-header,
            .form-section{
                padding:28px;
            }
        }

        /* Fullscreen overlay */
        #pageLoader{
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100vh;
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(6px);
            z-index: 99999;

            display: flex;
            align-items: center;
            justify-content: center;

            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        /* Hide loader */
        #pageLoader.hidden{
            opacity: 0;
            visibility: hidden;
        }

        /* Center content */
        .loader-content{
            text-align: center;
        }

        /* Bigger modern spinner */
        .loader-spinner{
            width: 4rem;
            height: 4rem;
            border-width: 0.35rem;
        }

        .loader-text{
            color: white;
            font-size: 1rem;
            letter-spacing: 0.5px;
            opacity: 0.85;
        }

    </style>
</head>
<body>

    <div class="checkout-wrapper">
        <!-- LOADING OVERLAY -->
        <div id="pageLoader">
            <div class="loader-content">
                <div class="spinner-border text-light loader-spinner" role="status"></div>
                <p class="loader-text mt-3">Loading...</p>
            </div>
        </div>

        <!-- FORM -->
        <form 
            action="https://sandbox.payfast.co.za/eng/process"
            method="POST"
            id="paymentForm"
            class="checkout-card"
        >

            <!-- Header -->
            <div class="checkout-header">

                <div class="checkout-icon">
                    <i class="bi bi-bag-check"></i>
                </div>

                <h2 class="fw-bold mb-2">
                    Product Checkout
                </h2>

                <p class="mb-0 text-light opacity-75">
                    Complete the form below to continue with payment
                </p>

            </div>

            <!-- Form Body -->
            <div class="form-section">

                <div class="row g-4">

                    <!-- Product Name -->
                    <div class="col-12">
                        <label for="product_name" class="form-label">
                            Product Name
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-box"></i>
                            </span>

                            <input 
                                type="text"
                                class="form-control"
                                id="product_name"
                                name="item_name"
                                placeholder="Enter product name"
                                required
                                disabled
                            >
                        </div>
                    </div>

                    <!-- Product Price -->
                    <div class="col-md-6">
                        <label for="product_price" class="form-label">
                            Product Price
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                R
                            </span>

                            <input 
                                type="number"
                                step="0.01"
                                class="form-control"
                                id="product_price"
                                name="product_price"
                                placeholder="0.00"
                                required
                                disabled
                            >
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="col-md-6">
                        <label for="email" class="form-label">
                            Email Address
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-envelope"></i>
                            </span>

                            <input 
                                type="email"
                                class="form-control"
                                id="user_email"
                                name="user_email"
                                placeholder="Enter email address"
                                required
                                disabled
                            >
                        </div>
                    </div>

                    <!-- Name -->
                    <div class="col-md-6">
                        <label for="name" class="form-label">
                            First Name
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person"></i>
                            </span>

                            <input 
                                type="text"
                                class="form-control"
                                id="user_name"
                                name="user_name"
                                placeholder="Enter first name"
                                required
                                disabled
                            >
                        </div>
                    </div>

                    <!-- Surname -->
                    <div class="col-md-6">
                        <label for="surname" class="form-label">
                            Surname
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person-vcard"></i>
                            </span>

                            <input 
                                type="text"
                                class="form-control"
                                id="user_surname"
                                name="user_surname"
                                placeholder="Enter surname"
                                required
                                disabled
                                >
                        </div>
                    </div>

                    <!-- Submit -->
                    <div class="col-12 pt-2">
                        <button type="submit"class="submit-btn w-100 btn btn-success">
                            Continue to Payment
                        </button>
                    </div>

                </div>

            </div>

        </form>

    </div>


    <script defer src="/src/js/payment/payments.js"></script>

</body>
</html>
