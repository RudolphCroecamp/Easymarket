<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Easymarket-Cart</title>

	<script type="module" src="/src/js/auth/isAuthed.js"></script>

	<link rel="stylesheet" href="/src/css/styles.css">

	<script defer src="/src/js/NAV.js"></script>


	<!-- Bootstrap -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
	<!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"> -->


	<script defer src="/src/js/cart/cartPage.js" type="module"></script>

	<script defer type="module" src="/src/js/improved_messages/chatList.js"></script>

</head>

<style>
	* {
		font-family: 'DM Sans', sans-serif;
		box-sizing: border-box;
	}

	.page {
		min-height: 100vh;
		padding: 2rem 1rem;
	}

	.card {
		border: 1px solid #dddbd5;
		border-radius: 14px;
		background: #fff;
		position: relative;
	}

	.card-body {
		padding: 1.25rem 1.5rem;
	}

	.section-label {
		font-size: 11px;
		font-weight: 500;
		color: #aaa;
		text-transform: uppercase;
		letter-spacing: 0.08em;
		margin-bottom: .75rem;
	}

	/* CART ROW */

	.cart-row {
		display: flex;
		align-items: center;
		gap: 16px;
		width: 100%;
		padding: 18px 50px 18px 0;
		border-bottom: 1px solid #eee;
		position: relative;
		transition: background 0.2s;
	}

	.cart-row:last-child {
		border-bottom: none;
	}

	.cart-row:hover {
		background: #f8f9fa;
	}

	/* IMAGE */

	.prod-img {
		width: 64px;
		height: 64px;
		min-width: 64px;
		border-radius: 10px;
		overflow: hidden;
		background: #f3f3f3;
		flex-shrink: 0;
	}

	.prod-img img {
		width: 100%;
		height: 100%;
		object-fit: cover;
	}

	/* INFO */

	.prod-info {
		flex: 1;
		min-width: 0;
	}

	.prod-name {
		font-size: 14px;
		font-weight: 600;
		color: #1a1a18;
		margin: 0 0 4px;
		overflow: hidden;
		text-overflow: ellipsis;
		white-space: nowrap;
	}

	.prod-meta {
		font-size: 12px;
		color: #888;
		margin: 0;
		overflow: hidden;
		text-overflow: ellipsis;
		white-space: nowrap;
	}

	/* QUANTITY */

	.qty-box {
		display: flex;
		align-items: center;
		border: 1px solid #ddd;
		border-radius: 8px;
		overflow: hidden;
		flex-shrink: 0;
	}

	.qty-btn {
		width: 32px;
		height: 32px;
		border: none;
		background: #f8f8f8;
		cursor: pointer;
		transition: background 0.15s;
	}

	.qty-btn:hover {
		background: #eee;
	}

	.qty-val {
		width: 36px;
		text-align: center;
		font-size: 14px;
		font-weight: 500;
	}

	/* PRICE */

	.prod-price {
		width: 110px;
		min-width: 110px;
		text-align: right;
		font-size: 14px;
		font-weight: 600;
		white-space: nowrap;
		color: #1a1a18;
	}

	/* REMOVE */

	.bi{
		pointer-events: none;
	}

	.remove-btn {
		position: absolute;
		top: 12px;
		right: 12px;

		width: 30px;
		height: 30px;

		display: flex;
		align-items: center;
		justify-content: center;

		border: none;
		background: transparent;

		color: #000000;
		cursor: pointer;

		border-radius: 6px;

		z-index: 10000;

		transition:
			background 0.15s,
			color 0.15s;
	}

	.remove-btn:hover {
		background: #fbeaea;
		color: #d11a2a;
	}

	/* SUMMARY */

	.summary-row,
	.summary-total {
		display: flex;
		justify-content: space-between;
	}

	.summary-row {
		font-size: 13px;
		color: #666;
		margin-bottom: 8px;
	}

	.summary-total {
		font-size: 16px;
		font-weight: 700;
		color: #1a1a18;
		padding-top: 10px;
		border-top: 1px solid #ddd;
		margin-top: 4px;
	}

	/* BUTTON */

	.btn-primary-dark {
		width: 100%;
		border: none;
		border-radius: 10px;
		background: #1a1a18;
		color: #fff;
		font-size: 14px;
		font-weight: 600;
		padding: 12px 20px;
		transition: background 0.2s;
	}

	.btn-primary-dark:hover {
		background: #333;
	}

	/* EMPTY STATE */

	.empty-state {
		display: none;
		text-align: center;
		padding: 3rem 1rem;
	}

	.empty-icon {
		font-size: 3rem;
		margin-bottom: 1rem;
	}
</style>



<body class="bg-body-tertiary">
	<!-- NAVBAR -->
	<nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm py-2" id="NAV">
		<!-- Nav comes here -->
	</nav>

	<div class="page">
		<div class="container-lg" style="max-width:960px;">
			<div class="row g-4 align-items-start">
				<div class="col-lg-8">


					<div class="card">
						<div class="card-body">
							<p class="section-label mb-3">Cart items</p>
							<div id="cart-list">
								<!-- cart items come here -->
							</div>

							<div class="empty-state" id="empty-state">
								<div class="empty-icon">🛒</div>
								<p style="font-size:15px;font-weight:500;color:#1a1a18;margin:0 0 4px;">
									Your cart is empty</p>
								<p style="font-size:13px;color:#888;">Add some items to get started</p>
							</div>

						</div>
					</div>

				</div>

				<div class="col-lg-4">
					<div class="card">
						<div class="card-body">
							<p class="section-label">Order summary</p>

							<div id="summary-rows">
								<div class="summary-row"><span>Subtotal</span><span
										id="sum-subtotal">....</span></div>
								<div class="summary-row"><span>Shipping</span><span id="sum-shipping"
										style="color:#3b6d11;">....</span>
								</div>
								<div class="summary-row"><span>VAT (15%)</span><span id="sum-vat">....</span></div>
							</div>
							<div class="summary-total"><span>Total</span><span id="sum-total">...</span></div>

							<button class="btn-primary-dark mt-4" id="checkoutBtn">Proceed to checkout</button>
						</div>
					</div>
				</div>

			</div>
		</div>
	</div>



	<!-- Offcanvas (Right Side Nav) -->
	<div class="offcanvas offcanvas-end rounded me-2 my-5 marginTop" data-bs-scroll="true" data-bs-backdrop="false"
		tabindex="-1" id="contactPanel">
		<div class="offcanvas-header">
			<h5 class="offcanvas-title">Chat</h5>
			<button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
		</div>

		<div class="offcanvas-body d-flex flex-column p-0">

			<!-- Messages -->
			<div id="chat_canvas" class="flex-grow-1 p-3 overflow-auto">
				<!-- Messages are added here-->
			</div>

		</div>
	</div>


	<!-- Chat Modal - used to send messages -->
	<div class="modal fade" id="chatModal" tabindex="-1">
		<div class="modal-dialog modal-dialog-centered modal-lg">
			<div class="modal-content">

				<div class="modal-header">
					<h5 class="modal-title" id="chatUserName">Chat</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>

				<div class="modal-body">
					<div id="chatMessagesContainer" class="d-flex flex-column gap-2 overflow-auto"
						style="max-height: 20vh;">
						<!-- messages are added here -->
					</div>
				</div>


				<!-- CHAT INPUT BOX -->
				<div class="modal-footer ">
					<div class="input-group">
						<input type="text" class="form-control" placeholder="Type a message..." id="messageInputModal">

						<button class="btn btn-success" id="btnSendMessageModal">
							Send
						</button>
					</div>
				</div>

			</div>
		</div>
	</div>

	<script>

		function removeCard(id) {
			console.log("try removing");
			const row = document.querySelector(`.cart-row[data-id="${id}"]`);
			console.log(row);
			if (!row) return;

			row.classList.add("removing");

			setTimeout(() => {
				row.remove();
			}, 200);
		}


		function changeQty(itemID, amount) {
			console.log("clicked on changeQtyBtn");
			if (!itemID) return
			const quantityElm = document.getElementById(`qty-${itemID}`)
			let quantity = Number(quantityElm.textContent)

			if (amount >= 0) {
				//add 1
				quantityElm.textContent = quantity += 1
			} else {
				//remove 1

				//do not go less that one item
				if (quantity >= 2) {
					quantityElm.textContent = quantity -= 1
				} else {
					quantityElm.textContent = 1//do not go less that one item
				}
			}
		}


	</script>

</body>
