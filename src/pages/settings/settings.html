<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Modern Settings Page</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <script defer src="/src/js/NAV.js"></script>

    <style>
        body {
            background: #f4f7fb;
            font-family: "Inter", sans-serif;
        }

        .settings-wrapper {
            min-height: 100vh;
            padding: 24px;
        }

        /* LEFT SIDEBAR */
        .settings-sidebar {
            width: 280px;
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            position: sticky;
            top: 20px;
        }

        .settings-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 25px;
        }

        .settings-nav .nav-link {
            border-radius: 14px;
            padding: 14px 16px;
            color: #4b5563;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
            margin-bottom: 8px;
        }

        .settings-nav .nav-link i {
            font-size: 1.1rem;
        }

        .settings-nav .nav-link:hover {
            background: #f3f4f6;
            color: #111827;
            transform: translateX(3px);
        }

        .settings-nav .nav-link.active {
            background: #111827;
            color: white;
            box-shadow: 0 6px 18px rgba(17,24,39,0.2);
        }

        /* CONTENT AREA */
        .settings-content {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            min-height: 700px;
        }

        .section-title {
            font-weight: 700;
            margin-bottom: 6px;
        }

        .section-subtitle {
            color: #6b7280;
            margin-bottom: 30px;
        }

        .form-control,
        .form-select {
            border-radius: 14px;
            padding: 12px 14px;
            border: 1px solid #dbe1ea;
        }

        .form-control:focus,
        .form-select:focus {
            box-shadow: none;
            border-color: #111827;
        }

        .save-btn {
            border-radius: 14px;
            padding: 12px 22px;
            font-weight: 600;
        }

        .profile-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #eef2f7;
        }

        .setting-card {
            border: 1px solid #eef2f7;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 991px) {
            .settings-sidebar {
                width: 100%;
                position: relative;
                top: 0;
                margin-bottom: 20px;
            }

            .settings-content {
                min-height: auto;
            }
        }
    </style>
</head>
<body>
<!-- NAVBAR -->
    <nav id="NAV" class="navbar navbar-dark bg-dark sticky-top shadow-sm border-bottom">
        <!-- Nav comes here -->
    </nav>

<div class="container-fluid settings-wrapper">
    <div class="row g-4">

        <!-- SIDEBAR -->
        <div class="col-lg-3">
            <div class="settings-sidebar">

                <div class="settings-title">
                    <i class="bi bi-gear-fill me-2"></i>
                    Settings
                </div>

                <div class="nav flex-column settings-nav nav-pills" id="settingsTabs">

                    <button 
                        class="nav-link active"
                        data-bs-toggle="pill"
                        data-bs-target="#profile"
                    >
                        <i class="bi bi-person-circle"></i>
                        Profile
                    </button>

                    <button 
                        class="nav-link"
                        data-bs-toggle="pill"
                        data-bs-target="#security"
                    >
                        <i class="bi bi-shield-lock"></i>
                        Security
                    </button>

                    <button 
                        class="nav-link"
                        data-bs-toggle="pill"
                        data-bs-target="#banking"
                    >
                        <i class="bi bi-bank"></i>
                        Bank Info
                    </button>

                    <button 
                        class="nav-link"
                        data-bs-toggle="pill"
                        data-bs-target="#appearance"
                    >
                        <i class="bi bi-palette"></i>
                        Appearance
                    </button>

                </div>

            </div>
        </div>

        <!-- CONTENT -->
        <div class="col-lg-9">
            <div class="settings-content tab-content">

                <!-- PROFILE -->
                <div class="tab-pane fade show active" id="profile">

                    <h3 class="section-title">Profile Settings</h3>
                    <p class="section-subtitle">
                        Update your personal information and profile details.
                    </p>

                    <div class="setting-card">

                        <div class="d-flex align-items-center gap-4 mb-4">
                            <img 
                                src="https://i.pravatar.cc/150?img=12"
                                class="profile-avatar"
                            >

                            <div>
                                <button class="btn btn-dark rounded-pill px-4">
                                    Change Photo
                                </button>
                            </div>
                        </div>

                        <div class="row g-3">

                            <div class="col-md-6">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" value="John">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" value="Doe">
                            </div>

                            <div class="col-12">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" value="john@example.com">
                            </div>

                        </div>

                    </div>

                    <button class="btn btn-dark save-btn">
                        Save Changes
                    </button>

                </div>

                <!-- SECURITY -->
                <div class="tab-pane fade" id="security">

                    <h3 class="section-title">Security Settings</h3>
                    <p class="section-subtitle">
                        Manage passwords and account protection.
                    </p>

                    <div class="setting-card">

                        <div class="mb-3">
                            <label class="form-label">Current Password</label>
                            <input type="password" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" class="form-control">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" class="form-control">
                        </div>

                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" checked>
                            <label class="form-check-label">
                                Enable Two-Factor Authentication
                            </label>
                        </div>

                    </div>

                    <button class="btn btn-dark save-btn">
                        Update Security
                    </button>

                </div>

                <!-- BANKING -->
                <div class="tab-pane fade" id="banking">

                    <h3 class="section-title">Bank Information</h3>
                    <p class="section-subtitle">
                        Manage payout and banking details.
                    </p>

                    <div class="setting-card">

                        <div class="row g-3">

                            <div class="col-md-6">
                                <label class="form-label">Bank Name</label>
                                <input type="text" class="form-control">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Account Holder</label>
                                <input type="text" class="form-control">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Account Number</label>
                                <input type="text" class="form-control">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Branch Code</label>
                                <input type="text" class="form-control">
                            </div>

                        </div>

                    </div>

                    <button class="btn btn-dark save-btn">
                        Save Bank Details
                    </button>

                </div>

                <!-- APPEARANCE -->
                <div class="tab-pane fade" id="appearance">

                    <h3 class="section-title">Appearance</h3>
                    <p class="section-subtitle">
                        Customize the look and feel of your account.
                    </p>

                    <div class="setting-card">

                        <div class="mb-4">
                            <label class="form-label">Theme</label>

                            <select class="form-select">
                                <option>Light</option>
                                <option>Dark</option>
                                <option>System Default</option>
                            </select>
                        </div>

                    </div>

                    <button class="btn btn-dark save-btn">
                        Save Preferences
                    </button>

                </div>

            </div>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
