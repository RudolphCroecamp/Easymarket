<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easymarket-Register</title>
    
    <!-- Bootstrap -->
    <link defer rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="/src/css/styles.css">

    <script defer type="module" src="/src/js/auth/signupRequest.js"></script>

    <script defer type="module" src="/src/js/toast.js"></script>
    <script defer type="module" src="/src/js/handleErrorMessage.js"></script>
</head>
<body class="bg-body-tertiary">

    <nav id="NAV" class="navbar navbar-dark bg-dark sticky-top shadow-sm border-bottom">
        <div class="container-fluid d-flex align-items-center justify-content-between py-2">

            <!-- LEFT SIDE -->
            <a class="navbar-brand d-flex align-items-center gap-2 m-0" href="/">
                <img 
                    src="/src/images/logo.png"
                    alt="Logo"
                    width="42"
                    height="42"
                    class="rounded-circle border border-light object-fit-cover"
                >

                <span class="fw-bold text-white fs-5">
                    EasyMarket
                </span>
            </a>

            <!-- RIGHT SIDE -->
            <div class="d-flex align-items-center gap-2">

                <!-- LOGIN BUTTON -->
                <a href="./login.html" class="btn btn-outline-light rounded-pill px-4">
                    Login
                </a>

                <!-- REGISTER BUTTON -->
                <a href="./register.html" class="btn btn-primary rounded-pill px-4">
                    Register
                </a>

            </div>

        </div>
    </nav>


    <div class="container-fluid">
        <div class="row vh-100">

            <!-- Image (hidden on small screens) -->
            <div class="col-lg-6 d-none d-lg-block p-0">
                <img src="/src/images/login_img.jpg"
                    class="img-fluid h-100 w-100 object-fit-cover"
                    alt="login image">
            </div>

            <!-- Login Form -->
            <div class="col-12 col-lg-6 d-flex align-items-center justify-content-center">
                <form id="signupForm" style="max-width:400px; width:100%;" method="post">
                    <h2 class="mb-4 text-center">Register</h2>

                    <div>
                        <div class="form-floating mb-3">
                            <input type="text" name="fname" id="fname" class="form-control" required>
                            <label class="form-label" for="fname">First name</label>
                        </div>
                        

                        <div class="form-floating mb-3">                       
                            <input type="text" name="lname" id="lname" class="form-control" required>
                            <label class="form-label" for="lname">Last name</label>
                        </div>

                        <div class="form-floating mb-3"> 
                            <input type="email" name="email" id="email" class="form-control" required>
                            <label class="form-label" for="email">Email</label>
                        </div>

                        <div class="form-floating mb-3"> 
                            <input type="password" name="password" id="password" class="form-control" required>
                            <label class="form-label" for="password">Password</label>
                        </div>
                        
                        <div class="form-floating mb-3">
                            <input type="password" name="conpassword" id="conpassword" class="form-control" required>
                            <label class="form-label" for="conpassword">Confirm Password</label>
                        </div>

                        <button class="btn btn-primary w-100" type="submit">Submit</button>

                        <div class="text-center mb-3">
                        <a href="./login.html" class="text-decoration-none">Already have an account</a>
                    </div>
                    </div>
                </form>
        </div>
    </div>
</div>

    

    

</body>
</html>
