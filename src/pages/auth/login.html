<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easymarket-Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script defer type="module" src="../../js/auth/loginRequest.js"></script>

    <script defer type="module" src="../../js/toast.js"></script>
    <script defer type="module" src="../../js/handleErrorMessage.js"></script>
</head>
<body class="bg-body-tertiary">

    <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Logo</a>
            <a class="btn btn-primary bg-transparent border-0 fs-4" href="/">Easymarket</a>
        <div>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mynavbar">

            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link btn-link active" href="./login.html">Login</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="./Register.html">Register</a>
                </li>
            </ul>
        </div>
    </nav>


    <div class="container-fluid">
        <div class="row vh-100">

            <!-- Image (hidden on small screens) -->
            <div class="col-lg-6 d-none d-lg-block p-0">
                <!-- <img src="/src/images/login_img.jpg"
                    class="img-fluid h-100 w-100 object-fit-cover"
                    alt="login image"> -->
            </div>

            <!-- Login Form -->
            <div class="col-12 col-lg-6 d-flex align-items-center justify-content-center">

            <div style="max-width:400px; width:100%;">
                <h2 class="mb-4 text-center">Login</h2>

                <form id="loginForm" method="post">
                    <div class="form-floating mb-3">
                        <input type="email" name="email" id="email" class="form-control">
                        <label class="form-label" for="email">Email</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="password" name="password" id="password" class="form-control">
                        <label class="form-label" for="password">Password</label>
                    </div>
                    
                    <div class="mb-3">
                        <!-- <input type="checkbox" class="form-check-input" id="Remember_me">
                            <label for="Remember_me">Remember me</label>
                        </input> -->
                        <a href="./forgot-password.html" class="text-decoration-none float-end">Forgot password?</a>
                    </div>


                    <button class="btn btn-primary w-100" type="submit">Login</button>
                </form>
            </div>

        </div>
    </div>
</div>

    

    

</body>
</html>
