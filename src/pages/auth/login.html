<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easymarket-Login</title>
    
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css">

    <link rel="stylesheet" href="/src/css/styles.css">

    <script defer type="module" src="/src/js/auth/loginRequest.js"></script>

    <script defer type="module" src="/src/js/toast.js"></script>
    <script defer type="module" src="/src/js/handleErrorMessage.js"></script>

    <!-- Bootstrap -->
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css">
    <script  href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css">  -->
    

    
</head>
<body class="bg-body-tertiary">

    <!-- NAVBAR -->
    <nav id="NAV" class="navbar navbar-dark bg-dark sticky-top shadow-sm border-bottom">
        <div class="container-fluid d-flex align-items-center justify-content-between py-2">

            <!-- LEFT SIDE -->
            <a class="navbar-brand d-flex align-items-center gap-2 m-0" href="/">
                <img 
                    src="/src/images/logo.png"
                    alt="Logo"
                    width="42"
                    height="42"
                    class="rounded-circle border border-light object-fit-cover"
                >

                <span class="fw-bold text-white fs-5">
                    EasyMarket
                </span>
            </a>

            <!-- RIGHT SIDE -->
            <div class="d-flex align-items-center gap-2">

                <!-- LOGIN BUTTON -->
                <a href="./login.html" class="btn btn-outline-light rounded-pill px-4">                    
                    Login
                </a>

                <!-- REGISTER BUTTON -->
                <a href="./register.html" class="btn btn-primary rounded-pill px-4">
                    Register
                </a>

            </div>

        </div>
    </nav>

    <div class="container-fluid">
        <div class="row vh-100">

            <!-- Image (hidden on small screens) -->
            <div class="col-lg-6 d-none d-lg-block p-0">
                <img src="/src/images/login_img.jpg"
                    class="img-fluid h-100 w-100 object-fit-cover"
                    alt="login image">
            </div>

            <!-- Login Form -->
            <div class="col-12 col-lg-6 d-flex align-items-center justify-content-center">

            <div style="max-width:400px; width:100%;">
                <h2 class="mb-4 text-center">Login</h2>

                <form id="loginForm" method="post">
                    <div class="form-floating mb-3">
                        <input type="email" name="email" id="email" class="form-control">
                        <label class="form-label" for="email">Email</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="password" name="password" id="password" class="form-control">
                        <label class="form-label" for="password">Password</label>
                    </div>
                    
                    

                    <button class="btn btn-primary w-100" type="submit">Login</button>

                    <div class="mb-3 d-inline">
                        <a href="./register.html" class="text-decoration-none float-start mt-2">Create an account</a>
                    </div>

                    <div class="mb-3 d-inline">
                        <a href="./forgot-password.html" class="text-decoration-none float-end mt-2">Forgot password?</a>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>

    

    

</body>
</html>
