<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easymarket-Admin-Dashboard</title>

    <script type="module" src="/src/js/auth/isAuthed.js" ></script>

    <link defer href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="/src/css/admin.css">
    <script defer src="/src/js/Nav/adminNav.js"></script>

</head>
<body class="bg-body-tertiary">

<!-- NAVBAR -->
<nav id="NAV" class="navbar navbar-dark bg-dark shadow-sm">
    <!-- Nav comes here -->
</nav>

    <!-- left canvas  -->
    <div class="app">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            
            <!-- Toggle -->
            <button class="toggle-btn bg-transparent border-0 align-self-end p-2 me-3" id="toggleBtn">
                <i id="toggleIcon" class="bi bi-arrow-left-square text-white"></i>
            </button> 

            <!-- Nav Items -->
            <nav class="nav">
                <a href="./dashboard.html" class="nav-item active">
                    <i class="bi bi-speedometer2"></i>
                    <span class="label">Dashboard</span>
                </a>

                <a href="./dashboards/users.html?page=1" class="nav-item">
                    <i class="bi bi-people"></i>
                    <span class="label">Users</span>
                </a>

                <a href="./dashboards/listings.html?page=1" class="nav-item">
                    <i class="bi bi-box-seam"></i>
                    <span class="label">Listings</span>
                </a>

                <a href="./dashboards/payments.html?page=1" class="nav-item">
                    <i class="bi bi-credit-card-2-back"></i>
                    <span class="label">Payments</span>
                </a>

                <!-- <a href="./dashboards/users.html" class="nav-item">
                    <i class="bi bi-gear"></i>
                    <span class="label">Settings</span>
                </a> -->

                <!-- LOGOUT (BOTTOM) -->
                <div class="logout-wrapper">
                    <a href="/src/pages/auth/logout.html" class="btn btn-danger rounded-pill px-4 w-100">
                        <i class="bi bi-box-arrow-right"></i>
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main content -->
        <main class="content">
            <h1>Admin Panel</h1>
        </main>
    </div>


<script>

    document.addEventListener("DOMContentLoaded", () => {

        const sidebar = document.getElementById("sidebar");
        const toggleBtn = document.getElementById("toggleBtn");
        const toggleIcon = document.getElementById("toggleIcon");

        if (!sidebar || !toggleBtn || !toggleIcon) {
            console.log("Sidebar elements not found");
            return;
        }

        toggleBtn.addEventListener("click", () => {

            sidebar.classList.toggle("collapsed");

            if(sidebar.classList.contains("collapsed")){

                toggleIcon.classList.remove("bi-arrow-left-square");
                toggleIcon.classList.add("bi-arrow-right-square");

            } else {

                toggleIcon.classList.remove("bi-arrow-right-square");
                toggleIcon.classList.add("bi-arrow-left-square");

            }

        });

    });
</script>



</body>


</html>
