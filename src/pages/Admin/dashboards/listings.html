<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Products Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="/src/css/admin.css">
    <script defer src="/src/js/Nav/adminNav.js"></script>

    <script defer src="/src/js/Admin/tables/listingsTable.js"></script>

</head>
<body>

<!-- NAVBAR -->
<nav id="NAV" class="navbar navbar-dark bg-dark shadow-sm border-bottom">
    <!-- Nav comes here -->
</nav>



<!-- left canvas  -->
    <div class="app">
        
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            
            <!-- Toggle -->
            <button class="toggle-btn bg-transparent border-0 align-self-end p-2 me-3" id="toggleBtn">
                <i id="toggleIcon" class="bi bi-arrow-left-square text-white"></i>
            </button> 

            <!-- Nav Items -->
            <nav class="nav">
                <a href="../dashboard.html" class="nav-item">
                    <i class="bi bi-speedometer2"></i>
                    <span class="label">Dashboard</span>
                </a>

                <a href="./users.html?page=1" class="nav-item">
                    <i class="bi bi-people"></i>
                    <span class="label">Users</span>
                </a>

                <a href="./listings.html?page=1" class="nav-item active">
                    <i class="bi bi-box-seam"></i>
                    <span class="label">Listings</span>
                </a>

                <a href="./payments.html?page=1" class="nav-item">
                    <i class="bi bi-credit-card-2-back"></i>
                    <span class="label">Payments</span>
                </a>

            </nav>
        </aside>

        <!-- Main content -->
        <main class="content">
            <div class="container py-4">
                

                <!-- HEADER -->

                <div class="dashboard-header mb-4">

                    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">

                        <div>
                            <h1 class="dashboard-title mb-1">
                                Listings Dashboard
                            </h1>

                            <div class="dashboard-subtitle">
                                Manage listings, inventory, pricing and sales
                            </div>
                        </div>

                        <!-- <button class="btn btn-dark px-4 py-3 rounded-4">
                            <i class="bi bi-plus-lg"></i>
                            Add Product
                        </button> -->

                    </div>

                </div>

                <!-- STATS -->

                <div class="row g-3 mb-4">

                    <div class="col-12 col-md-6 col-xl-3">

                        <div class="stats-card">

                            <div class="d-flex justify-content-between align-items-center">

                                <div>
                                    <div class="text-muted small mb-1">
                                        Total Products
                                    </div>

                                    <h3 class="fw-bold mb-0">
                                        57
                                    </h3>
                                </div>

                                <div class="stats-icon bg-primary-subtle text-primary">
                                    <i class="bi bi-box-seam"></i>
                                </div>

                            </div>

                        </div>

                    </div>

                    <div class="col-12 col-md-6 col-xl-3">

                        <div class="stats-card">

                            <div class="d-flex justify-content-between align-items-center">

                                <div>
                                    <div class="text-muted small mb-1">
                                        Total Sales
                                    </div>

                                    <h3 class="fw-bold mb-0">
                                        R4668
                                    </h3>
                                </div>

                                <div class="stats-icon bg-success-subtle text-success">
                                    <i class="bi bi-currency-dollar"></i>
                                </div>

                            </div>

                        </div>

                    </div>

                


                </div>

                <!-- SEARCH + FILTERS -->

                <div class="row g-3 align-items-center mb-4">

                    <div class="col-lg-8">

                        <div class="input-group search-box">

                            <span class="input-group-text bg-transparent border-0">
                                <i class="bi bi-search"></i>
                            </span>

                            <input 
                                type="text"
                                class="form-control"
                                placeholder="Search products..."
                            >

                            <button class="search-btn">
                                Search
                            </button>

                        </div>

                    </div>

                    <div class="col-lg-4">

                        <div class="d-flex justify-content-lg-end gap-2">

                            <button class="filter-btn">
                                <i class="bi bi-funnel"></i>
                                Filters
                            </button>

                            <button class="filter-btn">
                                <i class="bi bi-download"></i>
                                Export
                            </button>

                        </div>

                    </div>

                </div>

                <!-- TABLE -->

                <div class="table-card">

                    <div class="table-responsive">

                        <table class="table align-middle mb-0">

                            <thead>
                                <tr>
                                    <th>Product</th>
                                    <th>Category</th>
                                    <th>Price</th>
                                    <th>Status</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>

                            <tbody id="listingsTable">

                                <!-- listings comes here -->

                            </tbody>

                        </table>

                        <div class="btn-group d-flex justify-content-center">
                            <button class="btn" id="btnPrevPage" disabled>Prev</button>
                            <button class="btn" id="btnNextPage">Next</button>
                        </div>

                    </div>

                </div>

            </div>
        </main>
    </div>


<script>

    document.addEventListener("DOMContentLoaded", () => {

        const sidebar = document.getElementById("sidebar");
        const toggleBtn = document.getElementById("toggleBtn");
        const toggleIcon = document.getElementById("toggleIcon");

        if (!sidebar || !toggleBtn || !toggleIcon) {
            console.log("Sidebar elements not found");
            return;
        }

        toggleBtn.addEventListener("click", () => {

            sidebar.classList.toggle("collapsed");

            if(sidebar.classList.contains("collapsed")){

                toggleIcon.classList.remove("bi-arrow-left-square");
                toggleIcon.classList.add("bi-arrow-right-square");

            } else {

                toggleIcon.classList.remove("bi-arrow-right-square");
                toggleIcon.classList.add("bi-arrow-left-square");

            }

        });

    });
</script>

</body>
</html>
