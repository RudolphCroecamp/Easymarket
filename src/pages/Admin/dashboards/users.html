<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users Dashboard</title>

    <link defer href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script defer type="module" src="/src/js/toast.js"></script>
    <script defer type="module" src="/src/js/handleErrorMessage.js"></script>

    <script defer src="/src/js/Admin/tables/usersTable.js"></script>

    <link rel="stylesheet" href="/src/css/admin.css">
    <script defer src="/src/js/Nav/adminNav.js"></script>

</head>
<body>

<!-- NAVBAR -->
<nav id="NAV" class="navbar navbar-dark bg-dark shadow-sm border-bottom">
    <!-- Nav comes here -->
</nav>
    <!-- left canvas  -->
    <div class="app">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            
            <!-- Toggle -->
            <button class="toggle-btn bg-transparent border-0 align-self-end p-2 me-3" id="toggleBtn">
                <i id="toggleIcon" class="bi bi-arrow-left-square text-white"></i>
            </button> 

            <!-- Nav Items -->
            <nav class="nav">
                <a href="../dashboard.html" class="nav-item">
                    <i class="bi bi-speedometer2"></i>
                    <span class="label">Dashboard</span>
                </a>

                <a href="./users.html?page=1" class="nav-item active">
                    <i class="bi bi-people"></i>
                    <span class="label">Users</span>
                </a>

                <a href="./listings.html?page=1" class="nav-item">
                    <i class="bi bi-box-seam"></i>
                    <span class="label">Listings</span>
                </a>

                <a href="./payments.html?page=1" class="nav-item">
                    <i class="bi bi-credit-card-2-back"></i>
                    <span class="label">Payments</span>
                </a>

            </nav>
        </aside>

        <!-- Main content -->
        <main class="content">
            <div class="container py-4">

                <!-- HEADER -->
                <div class="dashboard-header mb-4">

                    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">

                        <div>
                            <h1 class="dashboard-title mb-1">
                                Users Dashboard
                            </h1>

                            <div class="dashboard-subtitle">
                                Manage, search and monitor all platform users
                            </div>
                        </div>

                    </div>

                </div>

                <!-- STATS -->
                <div class="row g-3 mb-4">

                    <div class="col-12 col-md-4">
                        <div class="stats-card">

                            <div class="d-flex justify-content-between align-items-center">

                                <div>
                                    <div class="text-muted small mb-1">
                                        Total Users
                                    </div>

                                    <h3 class="fw-bold mb-0">
                                        5
                                    </h3>
                                </div>

                                <div class="stats-icon bg-primary-subtle text-primary">
                                    <i class="bi bi-people-fill"></i>
                                </div>

                            </div>

                        </div>
                    </div>

                    <div class="col-12 col-md-4">
                        <div class="stats-card">

                            <div class="d-flex justify-content-between align-items-center">

                                <div>
                                    <div class="text-muted small mb-1">
                                        Active Users
                                    </div>

                                    <h3 class="fw-bold mb-0">
                                        1
                                    </h3>
                                </div>

                                <div class="stats-icon bg-success-subtle text-success">
                                    <i class="bi bi-person-check-fill"></i>
                                </div>

                            </div>

                        </div>
                    </div>



                </div>

                <!-- SEARCH + FILTER -->
                <div class="row align-items-center mb-4 g-3">

                    <div class="col-lg-8">

                        <div class="input-group search-box">

                            <span class="input-group-text bg-transparent border-0">
                                <i class="bi bi-search"></i>
                            </span>

                            <input 
                                type="text" 
                                class="form-control"
                                placeholder="Search users by email, name or phone..."
                            >

                            <button class="search-btn">
                                Search
                            </button>

                        </div>

                    </div>

                    <div class="col-lg-4">

                        <div class="d-flex gap-2 justify-content-lg-end">

                            <button class="filter-btn">
                                <i class="bi bi-funnel"></i>
                                Filters
                            </button>

                            <button class="filter-btn">
                                <i class="bi bi-download"></i>
                                Export
                            </button>

                        </div>

                    </div>

                </div>

                <!-- USERS TABLE -->
                <div class="table-card">

                    <div class="table-responsive">

                        <table class="table align-middle mb-0">

                            <thead>
                                <tr>
                                    <th>User</th>
                                    <th>Email</th>
                                    <th>Address</th>
                                    <th>Rating</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>

                            <tbody id="UsersTable">
                                <!-- User data comes here  -->
                            </tbody>

                        </table>

                        <div class="btn-group d-flex justify-content-center">
                            <button class="btn" id="btnPrevPage" disabled>Prev</button>
                            <button class="btn" id="btnNextPage">Next</button>
                        </div>

                    </div>

                </div>

            </div>
        </main>
    </div>

<script>

    document.addEventListener("DOMContentLoaded", () => {

        const sidebar = document.getElementById("sidebar");
        const toggleBtn = document.getElementById("toggleBtn");
        const toggleIcon = document.getElementById("toggleIcon");

        if (!sidebar || !toggleBtn || !toggleIcon) {
            console.log("Sidebar elements not found");
            return;
        }

        toggleBtn.addEventListener("click", () => {

            sidebar.classList.toggle("collapsed");

            if(sidebar.classList.contains("collapsed")){

                toggleIcon.classList.remove("bi-arrow-left-square");
                toggleIcon.classList.add("bi-arrow-right-square");

            } else {

                toggleIcon.classList.remove("bi-arrow-right-square");
                toggleIcon.classList.add("bi-arrow-left-square");

            }

        });

    });
</script>



</body>
</html>
