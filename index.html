<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easymarket-Home</title>

    <script type="module" src="/src/js/auth/isAuthed.js" ></script>

    <link rel="stylesheet" href="/src/css/styles.css">

    <script defer src="/src/js/NAV.js"></script>
    
    <!-- Bootstrap -->
    <link defer rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>


    <script defer type="module" src="/src/js/products/getProducts.js"></script>

    <script defer type="module" src="/src/js/improved_messages/chatList.js"></script>

    <script defer type="module" src="/src/js/toast.js"></script>
    <script defer type="module" src="/src/js/handleErrorMessage.js"></script>
     
    
</head>


<body class="bg-body-tertiary">
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm py-2" id="NAV">
        <!-- Nav comes here -->
    </nav>
    
    <div class="container-fluid mt-4">
        <!-- Filters -->
        <div class="container my-3">

            <div class="bg-white shadow-sm rounded-4 p-3 border">

                <div class="d-flex flex-wrap flex-xs-nowrap align-items-center gap-2 justify-content-start justify-content-sm-center">

                    <!-- MIN -->
                    <div class="form-floating filter-input">

                        <input 
                            type="number"
                            id="minPriceInput"
                            class="form-control"
                            placeholder="Min"
                            value="0"
                        >

                        <label for="minPriceInput">
                            Min (R)
                        </label>

                    </div>

                    <!-- MAX -->
                    <div class="form-floating filter-input">

                        <input 
                            type="number"
                            id="maxPriceInput"
                            class="form-control"
                            placeholder="Max"
                            value="50000"
                        >

                        <label for="maxPriceInput">
                            Max (R)
                        </label>

                    </div>

                    <!-- APPLY -->
                    <button 
                        class="btn btn-primary rounded-pill px-4 h-100"
                        id="applyFilter"
                    >
                        Apply
                    </button>

                    <!-- LOCATION -->
                    <button 
                        class="btn btn-outline-secondary rounded-pill px-4 d-flex align-items-center gap-2"
                        data-bs-toggle="modal"
                        data-bs-target="#locationModal"
                    >

                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-geo-alt" viewBox="0 0 16 16">
                            <path d="M12.166 8.94c-.524 1.062-1.234 2.12-1.96 3.07A32 32 0 0 1 8 14.58a32 32 0 0 1-2.206-2.57c-.726-.95-1.436-2.008-1.96-3.07C3.304 7.867 3 6.862 3 6a5 5 0 0 1 10 0c0 .862-.305 1.867-.834 2.94M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10"/>
                            <path d="M8 8a2 2 0 1 1 0-4 2 2 0 0 1 0 4m0 1a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/>
                        </svg>

                        Location

                    </button>

                </div>

            </div>

        </div>

        <!-- PRODUCTS -->
        <div class="row g-4" id="products-container"></div>

        <!-- LOADER -->
        <div class="d-flex justify-content-center mt-5">
            <div class="spinner-border" role="status" id="loading">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>


    <!-- Offcanvas (Right Side Nav) -->
    <div class="offcanvas offcanvas-end rounded me-2 my-5 marginTop" data-bs-scroll="true" data-bs-backdrop="false"  tabindex="-1" id="contactPanel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">Chat</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body d-flex flex-column p-0">

            <!-- Messages -->
            <div id="chat_canvas" class="flex-grow-1 p-3 overflow-auto">
                <!-- Messages are added here-->
            </div>

        </div>
    </div>



    <!-- Chat Modal - used to send messages -->
    <div class="modal fade" id="chatModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="chatUserName">Chat</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div id="chatMessagesContainer" class="d-flex flex-column gap-2 overflow-auto" style="max-height: 20vh;">
                        <!-- messages are added here -->
                    </div>
                </div>


                <!-- CHAT INPUT BOX -->
                <div class="modal-footer ">
                    <div class="input-group">
                       <input type="text" 
                        class="form-control" 
                        placeholder="Type a message..."
                        id="messageInputModal">

                        <button class="btn btn-success" id="btnSendMessageModal">
                            Send
                        </button> 
                    </div>
                </div>
                
            </div>
        </div>
    </div>



    <!-- LOCATION MODAL -->
    <div class="modal fade" id="locationModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4">

                <div class="modal-header border-0">
                    <h5 class="modal-title">Set Location</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <!-- LOCATION INPUT -->
                    <label class="form-label small text-muted">Location</label>
                    <div class="input-group mb-3">
                        <span class="input-group-text bg-white">📍</span>
                        <input 
                            id="addressInput"
                            type="text"
                            class="form-control"
                            placeholder="Enter city or area..."
                            autocomplete="off"
                        >
                    </div>

                    <ul id="addressDropdown" class="dropdown-menu w-100 mt-1 shadow-sm"></ul>

                    <!-- RADIUS -->
                    <label class="form-label small text-muted mt-3">Radius (KM)</label>
                    <input 
                        type="number"
                        id="radiusInput"
                        class="form-control"
                        placeholder="e.g. 60"
                    >

                </div>

                <div class="modal-footer border-0">
                    <button class="btn btn-light" data-bs-dismiss="modal">
                        Cancel
                    </button>
                    <button class="btn btn-primary" data-bs-dismiss="modal" id="submitLocation">
                        Save
                    </button>
                </div>

            </div>
        </div>
    </div>



</body>

<script>
    //implement a search button
    document.addEventListener("DOMContentLoaded", ()=>{
        const searchBtn = document.getElementById("searchBtn")

        searchBtn.addEventListener("click", ()=>{
            console.log("Clicking search btn");
            const query = document.getElementById("searchBox").value
            
            //check that we have a value before making request to server
            if(!query || query.length === 0){
                console.log({"error" : "invalid search term"});
                return false;
            }

            window.location = `/src/pages/products/search-view.html?query=${encodeURIComponent(query)}`  
        })
    })
</script>

</html>
