<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easymarket-Home</title>
    <script type="module" src="./src/js/auth/isAuthed.js" ></script>

    <link defer href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script defer type="module" src="./src/js/products/getProducts.js"></script>

    <script defer type="module" src="./src/js/improved_messages/chatList.js"></script>

    <script defer type="module" src="./src/js/toast.js"></script>
    <script defer type="module" src="./src/js/handleErrorMessage.js"></script>


    <!-- price range slider -->
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css">
    <script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script> -->

    <style>
        #chatMessages {
            background: #f8f9fa;
        }

        .message {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .message.sent {
            background: #0d6efd;
            color: white;
            margin-left: auto;
        }

        .message.received {
            background: #e9ecef;
        }


        #chatMessages {
            background: #f8f9fa;
        }

        /* Chat item */
        .chat-item {
            cursor: pointer;
            border-bottom: 1px solid #eee;
            transition: background 0.2s ease;
        }

        .chat-item:hover {
            background: #f1f3f5;
        }

        /* Avatar */
        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* Title */
        .chat-title {
            font-size: 0.95rem;
            font-weight: 600;
        }

        /* Message preview */
        .chat-preview {
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Date */
        .chat-date {
            font-size: 0.75rem;
        }

        #chatMessagesContainer {
            height: 400px; /* or whatever fits your modal */
            overflow-y: auto;
        }

        .marginTop{
            margin-top: 7rem !important; 
        }

        /* #priceSlider {
            height: 6px;
        } */

        .card {
            transition: box-shadow 0.2s ease;
        }

        .card:hover {
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .smallertd{
            max-width: 200px;
        }



        .product-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border-radius: 14px;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .product-image-wrapper {
            width: 100%;
            height: 200px;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-image {
            max-height: 100%;
            object-fit: contain;

            opacity: 0;
            filter: blur(8px);
            transition: all 0.4s ease;
        }

        .product-image.loaded {
            opacity: 1;
            filter: blur(0);
        }

    </style>
    
</head>
<body class="bg-body-tertiary">
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark sticky-top">
        <div class="container-fluid d-flex flex-wrap row">
            <a class="navbar-brand col-6 col-sm-6" href="/">Logo</a>

            <button class="navbar-toggler col-2 col-sm-5 me-2" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse col-2 col-sm-5" id="mynavbar">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link btn-link active" href="/">Home</a>
                    </li>

                    <!-- Trigger (Contact Item) -->
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="offcanvas" data-bs-target="#contactPanel">
                            Open Contact
                        </button>
                    </li>

                    <!-- Trigger (listing dropdown) -->
                    <li class="dropdown">
                        <button class="nav-link btn-link dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            my listings
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="./src/pages/listings/view-listings.html">view listings</a></li>
                            <li><a class="dropdown-item" href="./src/pages/listings/new-lisiting.html">New listing</a></li>
                            <li><hr class="dropdown-divider "></li>
                            <li><a class="dropdown-item" href="./src/pages/listings/view-listings.html">Remove listing</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./src/pages/auth/logout.html">logout</a>
                    </li>
                </ul>
            </div>

            <div class="d-flex col-12 col-sm-10 col-md-6 col-lg-4 mt-2">
                <input class="form-control me-2" id="searchBox" type="text" placeholder="Search">
                <button class="btn btn-primary" id="searchBtn">Search</button>
            </div>

        </div>
    </nav>

    <div class="container-fluid mt-4">

    <!-- FILTER BAR -->
    <div class="container my-3">
        <div class="card border-0 shadow-sm rounded-4 p-2 p-md-3">

            <div class="row g-2 align-items-end justify-content-center">

                <!-- PRICE -->
                <div class="col-12 col-md-5">
                    <label class="form-label fw-semibold small text-muted">
                        Price Range
                    </label>

                    <div class="d-flex gap-2">

                        <!-- MIN -->
                        <div class="form-floating w-50">
                            <input 
                                type="number" 
                                id="minPriceInput"
                                class="form-control form-control-sm"
                                placeholder="Min (R)"
                                value="0"
                            >
                            <label for="minPriceInput">Min (R)</label>
                        </div>

                        <!-- MAX -->
                        <div class="form-floating w-50">
                            <input 
                                type="number" 
                                id="maxPriceInput"
                                class="form-control form-control-sm"
                                placeholder="Max (R)"
                                value="50000"
                            >
                            <label for="maxPriceInput">Max (R)</label>
                        </div>

                    </div>
                </div>

                <!-- LOCATION + RADIUS BUTTON -->
                <div class="col-12 col-md-4">
                    <button 
                        class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2"
                        data-bs-toggle="modal"
                        data-bs-target="#locationModal"
                    >
                        📍 Location & Radius
                    </button>
                </div>
            </div>

        </div>
    </div>

        <!-- PRODUCTS -->
        <div class="row g-4" id="products-container"></div>

        <!-- LOADER -->
        <div class="d-flex justify-content-center mt-5">
            <div class="spinner-border" role="status" id="loading">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

    </div>


    <!-- Offcanvas (Right Side Nav) -->
    <div class="offcanvas offcanvas-end rounded me-2 my-5 marginTop" data-bs-scroll="true" data-bs-backdrop="false"  tabindex="-1" id="contactPanel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">Chat</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body d-flex flex-column p-0">

            <!-- Messages -->
            <div id="chat_canvas" class="flex-grow-1 p-3 overflow-auto">
                <!-- Messages are added here-->
            </div>

        </div>
    </div>



    <!-- Chat Modal - used to send messages -->
    <div class="modal fade" id="chatModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="chatUserName">Chat</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div id="chatMessagesContainer" class="d-flex flex-column gap-2 overflow-auto" style="max-height: 20vh;">
                        <!-- messages are added here -->
                    </div>
                </div>


                <!-- CHAT INPUT BOX -->
                <div class="modal-footer ">
                    <div class="input-group">
                       <input type="text" 
                        class="form-control" 
                        placeholder="Type a message..."
                        id="messageInput">

                        <button class="btn btn-success " id="btnSendMessageModal">
                            Send
                        </button> 
                    </div>
                </div>
                
            </div>
        </div>
    </div>



    <!-- LOCATION MODAL -->
    <div class="modal fade" id="locationModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4">

                <div class="modal-header border-0">
                    <h5 class="modal-title">Set Location</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <!-- LOCATION INPUT -->
                    <label class="form-label small text-muted">Location</label>
                    <div class="input-group mb-3">
                        <span class="input-group-text bg-white">📍</span>
                        <input 
                            id="addressInput"
                            type="text"
                            class="form-control"
                            placeholder="Enter city or area..."
                            autocomplete="off"
                        >
                    </div>

                    <ul id="addressDropdown" class="dropdown-menu w-100 mt-1 shadow-sm"></ul>

                    <!-- RADIUS -->
                    <label class="form-label small text-muted mt-3">Radius (KM)</label>
                    <input 
                        type="number"
                        id="radiusInput"
                        class="form-control"
                        placeholder="e.g. 60"
                    >

                </div>

                <div class="modal-footer border-0">
                    <button class="btn btn-light" data-bs-dismiss="modal">
                        Cancel
                    </button>
                    <button class="btn btn-primary" data-bs-dismiss="modal" id="submitLocation">
                        Save
                    </button>
                </div>

            </div>
        </div>
    </div>



</body>

<script>

    //implement a search button
    document.addEventListener("DOMContentLoaded", ()=>{
        const searchBtn = document.getElementById("searchBtn")

        searchBtn.addEventListener("click", ()=>{
            console.log("Clicking search btn");
            const query = document.getElementById("searchBox").value
            
            //check that we have a value before making request to server
            if(!query || query.length === 0){
                console.log({"error" : "invalid search term"});
                return false;
            }

            window.location = `./src/pages/products/search-view.html?query=${encodeURIComponent(query)}`  
        })
    })
    



</script>
</html>
